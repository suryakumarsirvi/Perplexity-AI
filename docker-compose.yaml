services: 
  client: 
      build: ./client
      ports: 
       - "5173:5173"
      volumes: 
         - ./client:/app
         - PERPLEXITY_CLIENT_NODE_MODULES:/app/node_modules
      command: npm run dev
  server: 
      build: ./server
      ports: 
        - "5000:5000"
      volumes:
        - ./server:/app
        - PERPLEXITY_SERVER_NODE_MODULES:/app/node_modules
      env_file:
        - ./server/.env
      command: npm run dev

volumes:
   PERPLEXITY_CLIENT_NODE_MODULES:
   PERPLEXITY_SERVER_NODE_MODULES: